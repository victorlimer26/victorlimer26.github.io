<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" id="metaDesc" content="Ahmad Azhar — Portfolio. Web Developer & Creative Professional.">
  <meta name="author" id="metaAuthor" content="Ahmad Azhar">
  <title id="pageTitle">Ahmad Azhar — Portfolio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c9a84c'><polygon points='13 2 3 14 12 14 11 22 21 10 12 10 13 2'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Particle Canvas -->
  <canvas id="particleCanvas"></canvas>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#home" class="nav-logo" id="navLogo"></a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span class="hamburger"></span>
      </button>
      <ul class="nav-menu" id="navMenu"></ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section id="home" class="hero">
    <div class="hero-glow"></div>
    <div class="container">
      <div class="hero-content" id="heroContent"></div>
      <div class="hero-visual animate-fade-in delay-2">
        <div class="hero-graphic">
          <div class="graphic-ring ring-1"></div>
          <div class="graphic-ring ring-2"></div>
          <div class="graphic-ring ring-3"></div>
          <div class="graphic-initials" id="heroInitials"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- About Section -->
  <section id="about" class="about">
    <div class="container">
      <div class="section-header animate-on-scroll">
        <span class="section-tag">About Me</span>
        <h2 class="section-title">Get to Know Me</h2>
      </div>
      <div class="about-grid">
        <div class="about-text animate-on-scroll" id="aboutText"></div>
        <div class="about-image animate-on-scroll">
          <div class="image-frame">
            <div class="image-placeholder">
              <span class="placeholder-icon"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
              <span class="placeholder-name" id="aboutName"></span>
            </div>
            <div class="image-decoration"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Skills Section -->
  <section id="skills" class="skills">
    <div class="container">
      <div class="section-header animate-on-scroll">
        <span class="section-tag">Skills</span>
        <h2 class="section-title">Tech Stack &amp; Tools</h2>
        <p class="section-subtitle">Technologies I work with to bring ideas to life</p>
      </div>
      <div class="skills-grid animate-on-scroll" id="skillsGrid"></div>
    </div>
  </section>

  <!-- Projects Section -->
  <section id="projects" class="projects">
    <div class="container">
      <div class="section-header animate-on-scroll">
        <span class="section-tag">Projects</span>
        <h2 class="section-title">Featured Work</h2>
        <p class="section-subtitle">A selection of my recent projects and experiments</p>
      </div>
      <div class="projects-grid animate-on-scroll" id="projectsGrid"></div>
    </div>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="contact">
    <div class="container">
      <div class="section-header animate-on-scroll" id="contactHeader"></div>
      <div class="contact-content animate-on-scroll" id="contactContent"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content" id="footerContent"></div>
      <div class="footer-bottom">
        <p id="footerCopyright"></p>
      </div>
    </div>
  </footer>

  <script src="siteData.js"></script>
  <script src="script.js"></script>
</body>
</html>
