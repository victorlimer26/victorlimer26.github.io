<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Azhar | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
:root {
    --primary: #fbfc05;
    --primary-hover: #e6e700;
    --bg: #0f0f0f;
    --bg-card: #1a1a1a;
    --bg-input: #222;
    --text: #f5f5f5;
    --text-sub: #999;
    --border: #2a2a2a;
    --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: var(--primary); color: var(--bg); }
html { scroll-behavior: smooth; scroll-padding-top: 80px; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
}

a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* Container */
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

/* ─── NAV ─── */
.nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(15,15,15,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
}
.nav .container { display: flex; justify-content: space-between; align-items: center; height: 64px; }
.nav-logo { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
.nav-links { display: flex; gap: 8px; list-style: none; }
.nav-links a {
    padding: 6px 14px; border-radius: 6px;
    font-size: 0.85rem; font-weight: 500; color: var(--text-sub);
    transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--primary); }

.nav-toggle {
    display: none; background: none; border: none; cursor: pointer;
    flex-direction: column; gap: 5px; padding: 4px;
}
.nav-toggle span { width: 20px; height: 2px; background: var(--text); border-radius: 1px; transition: 0.3s; }
.nav-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.nav-toggle.active span:nth-child(2) { opacity: 0; }
.nav-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

.nav-right { display: flex; align-items: center; gap: 12px; }
.lang-switch { display: flex; gap: 2px; }
.lang-btn {
    width: 28px; height: 20px; padding: 0; border: 2px solid transparent;
    border-radius: 3px; cursor: pointer; opacity: 0.45; transition: 0.2s;
    background: none; overflow: hidden;
}
.lang-btn.active { opacity: 1; border-color: var(--primary); }
.lang-btn:hover { opacity: 0.8; }
.lang-btn svg { display: block; }

/* ─── SECTIONS ─── */
.section { padding: 100px 0; }
.section-label {
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 3px; color: var(--primary); margin-bottom: 8px;
}
.section-title { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
.section-sub { color: var(--text-sub); max-width: 500px; font-size: 0.95rem; margin-bottom: 48px; }

/* ─── HERO ─── */
.hero {
    min-height: 100vh; display: flex; align-items: center; padding-top: 64px;
    position: relative; overflow: hidden;
}
.hero::before {
    content: ''; position: absolute; top: -40%; right: -20%;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,252,5,0.06) 0%, transparent 70%);
    pointer-events: none;
}
.hero-inner { display: flex; align-items: center; gap: 60px; width: 100%; position: relative; z-index: 1; }
.hero-text { flex: 1; }
.hero-accent { width: 40px; height: 3px; background: var(--primary); border-radius: 2px; margin-bottom: 16px; }
.hero-greeting { font-size: 1.1rem; color: var(--text-sub); margin-bottom: 8px; font-weight: 400; }
.hero-name { font-size: clamp(2.8rem, 5.5vw, 4rem); font-weight: 700; line-height: 1.05; margin-bottom: 12px; letter-spacing: -1px; }
.hero-name span { color: var(--primary); text-shadow: 0 0 30px rgba(251,252,5,0.25), 0 0 60px rgba(251,252,5,0.1); }
.hero-status {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.78rem; color: var(--text-sub); margin-bottom: 16px;
    padding: 6px 14px; border-radius: 100px;
    background: rgba(251,252,5,0.06); border: 1px solid rgba(251,252,5,0.12);
}
.hero-status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
    animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
}
.hero-tagline {
    font-size: 1rem; font-weight: 500; margin-bottom: 20px;
    color: var(--bg); background: var(--primary); display: inline-block;
    padding: 4px 14px; border-radius: 4px;
}
.hero-desc { color: var(--text-sub); max-width: 460px; margin-bottom: 32px; font-size: 0.95rem; line-height: 1.7; }

.hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }

.btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 8px;
    font-size: 0.9rem; font-weight: 600; border: none;
    cursor: pointer; font-family: inherit; transition: 0.2s;
}
.btn-primary { background: var(--primary); color: var(--bg); }
.btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text-sub); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

.hero-stats {
    display: flex; gap: 0; margin-top: 48px;
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    background: var(--bg-card); width: fit-content;
}
.stat-item {
    padding: 20px 28px; text-align: center;
    border-right: 1px solid var(--border);
}
.stat-item:last-child { border-right: none; }
.stat-num { font-size: 1.6rem; font-weight: 700; color: var(--primary); line-height: 1; }
.stat-label { font-size: 0.68rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

.hero-photo {
    width: 320px; height: 320px; border-radius: 20px; overflow: hidden; flex-shrink: 0;
    background: var(--bg-card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 5rem; color: var(--text-sub); position: relative;
}
.hero-photo img { width: 100%; height: 100%; object-fit: cover; }
.hero-photo::after {
    content: ''; position: absolute; inset: 0; border-radius: 20px;
    border: 1px solid rgba(251,252,5,0.15); pointer-events: none;
}

/* Hero decorations */
.hero-decor { position: absolute; pointer-events: none; }
.hero-decor-1 {
    top: 15%; right: 10%; width: 60px; height: 60px;
    border: 2px solid rgba(251,252,5,0.1); border-radius: 12px;
    animation: float1 6s ease-in-out infinite;
}
.hero-decor-2 {
    bottom: 20%; left: 5%; width: 40px; height: 40px;
    border: 2px solid rgba(251,252,5,0.08); border-radius: 50%;
    animation: float2 8s ease-in-out infinite;
}
.hero-decor-3 {
    top: 35%; left: 15%; width: 6px; height: 6px;
    background: rgba(251,252,5,0.2); border-radius: 50%;
    animation: float3 5s ease-in-out infinite;
}
@keyframes float1 { 0%, 100% { transform: rotate(45deg) translateY(0); } 50% { transform: rotate(45deg) translateY(-20px); } }
@keyframes float2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
@keyframes float3 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

/* ─── ABOUT ─── */
.about-layout { display: flex; flex-direction: column; gap: 48px; }
.about-top { display: grid; grid-template-columns: 300px 1fr; gap: 48px; align-items: center; }
.about-img {
    aspect-ratio: 1/1; border-radius: 20px; overflow: hidden;
    background: var(--bg-card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; color: var(--text-sub); position: relative;
}
.about-img img { width: 100%; height: 100%; object-fit: cover; }
.about-img::after {
    content: ''; position: absolute; inset: 0; border-radius: 20px;
    border: 1px solid rgba(251,252,5,0.1); pointer-events: none;
}
.about-text p { color: var(--text-sub); margin-bottom: 14px; font-size: 0.95rem; line-height: 1.75; }
.about-cards {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
}
.about-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; text-align: center; transition: border-color 0.2s;
}
.about-card:hover { border-color: rgba(251,252,5,0.3); }
.about-card .ac-icon { font-size: 1.2rem; color: var(--primary); margin-bottom: 8px; }
.about-card .ac-label { font-size: 0.68rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.about-card .ac-value { font-weight: 600; color: var(--text); font-size: 0.9rem; }

/* ─── BUSINESS ─── */
.biz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.biz-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 0; overflow: hidden; transition: border-color 0.2s, transform 0.3s;
}
.biz-card:hover { border-color: rgba(251,252,5,0.3); transform: translateY(-4px); }
.biz-header {
    padding: 24px 24px 16px;
    background: linear-gradient(135deg, rgba(251,252,5,0.06) 0%, transparent 60%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
}
.biz-logo {
    width: 52px; height: 52px; border-radius: 14px; overflow: hidden;
    background: var(--bg-input); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 1.3rem; color: var(--primary);
    border: 1px solid var(--border);
}
.biz-logo img { width: 100%; height: 100%; object-fit: cover; }
.biz-name { font-weight: 700; font-size: 1.05rem; }
.biz-handle { font-size: 0.78rem; color: var(--primary); font-weight: 500; }
.biz-body { padding: 20px 24px 24px; }
.biz-desc { color: var(--text-sub); font-size: 0.88rem; margin-bottom: 16px; line-height: 1.6; }
.biz-features { list-style: none; margin-bottom: 20px; }
.biz-features li {
    font-size: 0.84rem; color: var(--text-sub); padding: 5px 0;
    display: flex; align-items: center; gap: 10px;
}
.biz-features li::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
.biz-bottom {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 16px; border-top: 1px solid var(--border);
}
.biz-price { font-size: 0.85rem; font-weight: 700; color: var(--primary); }
.biz-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.82rem; font-weight: 600; color: var(--bg);
    background: var(--primary); padding: 8px 16px; border-radius: 8px;
    transition: 0.2s;
}
.biz-link:hover { background: var(--primary-hover); transform: translateY(-1px); }

/* ─── SKILLS ─── */
.skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.skill-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px;
}
.skill-card h3 {
    font-size: 0.95rem; font-weight: 600; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px; color: var(--primary);
}
.skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.skill-tag {
    padding: 6px 12px; border-radius: 6px;
    background: var(--bg-input); border: 1px solid var(--border);
    font-size: 0.8rem; font-weight: 500; color: var(--text);
    display: inline-flex; align-items: center; gap: 6px;
    transition: 0.2s;
}
.skill-tag:hover { border-color: var(--primary); color: var(--primary); }

/* ─── PROJECTS ─── */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
.project-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: border-color 0.3s, transform 0.3s;
}
.project-card:hover { border-color: rgba(251,252,5,0.3); transform: translateY(-4px); }
.project-thumb {
    height: 210px; background: var(--bg-input); overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; color: #444;
}
.project-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.project-card:hover .project-thumb img { transform: scale(1.06); }
.project-count {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.8); color: var(--primary);
    font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 6px;
    display: flex; align-items: center; gap: 4px; backdrop-filter: blur(4px);
}
.project-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    opacity: 0; transition: 0.3s;
}
.project-card:hover .project-overlay { opacity: 1; }
.project-overlay a, .project-overlay button {
    padding: 10px 20px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; font-family: inherit; border: none; transition: 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
}
.project-overlay .prim { background: var(--primary); color: var(--bg); }
.project-overlay .prim:hover { transform: translateY(-1px); }
.project-overlay .ghost { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff; backdrop-filter: blur(4px); }
.project-overlay .ghost:hover { background: rgba(255,255,255,0.2); }
.project-body { padding: 22px; }
.project-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.project-tag {
    font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 100px;
    background: rgba(251,252,5,0.08); color: var(--primary); border: 1px solid rgba(251,252,5,0.12);
}
.project-body h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; }
.project-body p { color: var(--text-sub); font-size: 0.85rem; line-height: 1.6; }
.project-live {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px; font-size: 0.82rem; font-weight: 600; color: var(--primary);
    transition: 0.2s; cursor: pointer; background: none; border: none;
    font-family: inherit; padding: 0;
}
.project-live:hover { opacity: 0.7; }

/* ─── PROJECT DETAIL ─── */
.project-detail {
    position: fixed; inset: 0; z-index: 9998;
    background: var(--bg); overflow-y: auto;
    display: none;
}
.project-detail.active { display: block; animation: pdIn 0.3s ease; }
@keyframes pdIn { from { opacity:0; } to { opacity:1; } }
.pd-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(15,15,15,0.92); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 14px 0;
}
.pd-header .container { display: flex; align-items: center; }
.pd-back {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.85rem; font-weight: 500; color: var(--text-sub);
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 16px; cursor: pointer; font-family: inherit; transition: 0.2s;
}
.pd-back:hover { border-color: var(--primary); color: var(--primary); }
.pd-content { padding: 60px 0 100px; }
.pd-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 16px; }
.pd-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
.pd-tag {
    font-size: 0.78rem; font-weight: 600; padding: 6px 14px; border-radius: 100px;
    background: rgba(251,252,5,0.08); color: var(--primary); border: 1px solid rgba(251,252,5,0.12);
}
.pd-desc { color: var(--text-sub); font-size: 1rem; line-height: 1.8; max-width: 700px; margin-bottom: 40px; }
.pd-gallery {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
    margin-bottom: 40px;
}
.pd-gallery-img {
    border-radius: var(--radius); overflow: hidden; aspect-ratio: 16/10;
    background: var(--bg-card); border: 1px solid var(--border); cursor: pointer; transition: 0.3s;
}
.pd-gallery-img:hover { border-color: rgba(251,252,5,0.3); transform: translateY(-2px); }
.pd-gallery-img img { width: 100%; height: 100%; object-fit: cover; }
.pd-actions { display: flex; gap: 12px; flex-wrap: wrap; }

/* ─── CONTACT ─── */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
.contact-items { display: flex; flex-direction: column; gap: 20px; }
.contact-item { display: flex; align-items: center; gap: 14px; }
.contact-icon {
    width: 42px; height: 42px; border-radius: 8px;
    background: rgba(251,252,5,0.08); border: 1px solid rgba(251,252,5,0.15);
    display: flex; align-items: center; justify-content: center;
    color: var(--primary); flex-shrink: 0;
}
.contact-item h4 { font-size: 0.85rem; font-weight: 600; }
.contact-item p, .contact-item a { font-size: 0.85rem; color: var(--text-sub); transition: color 0.2s; }
.contact-item a:hover { color: var(--primary); }
.socials { display: flex; gap: 8px; margin-top: 24px; }
.social-btn {
    width: 40px; height: 40px; border-radius: 8px;
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
    color: var(--text-sub); font-size: 1rem; transition: 0.2s;
}
.social-btn:hover { border-color: var(--primary); color: var(--primary); }

.form { display: flex; flex-direction: column; gap: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form label { font-size: 0.75rem; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.form input, .form textarea {
    width: 100%; padding: 11px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
}
.form input::placeholder, .form textarea::placeholder { color: #555; }
.form input:focus, .form textarea:focus { border-color: var(--primary); }
.form textarea { resize: vertical; min-height: 100px; }

/* ─── FOOTER ─── */
.footer { border-top: 1px solid var(--border); padding: 28px 0; text-align: center; }
.footer p { font-size: 0.8rem; color: var(--text-sub); }
.footer span { color: var(--primary); }

/* ─── LIGHTBOX ─── */
.lightbox {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
}
.lightbox.active { display: flex; }
.lb-wrap { position: relative; max-width: 90vw; max-height: 85vh; display: flex; align-items: center; justify-content: center; }
.lb-img { max-width: 100%; max-height: 80vh; border-radius: 8px; object-fit: contain; }
.lb-close {
    position: fixed; top: 16px; right: 20px;
    background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: 0.2s;
}
.lb-close:hover { background: rgba(255,255,255,0.1); }
.lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: 1px solid #444; color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1rem; transition: 0.2s;
}
.lb-nav:hover { border-color: var(--primary); color: var(--primary); }
.lb-prev { left: -60px; }
.lb-next { right: -60px; }
.lb-counter {
    position: absolute; bottom: -32px; left: 50%; transform: translateX(-50%);
    font-size: 0.8rem; color: #666;
}

/* ─── SCROLL ANIMATIONS ─── */
.fade { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
.fade-left { opacity: 0; transform: translateX(-30px); transition: opacity 0.6s ease, transform 0.6s ease; }
.fade-right { opacity: 0; transform: translateX(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
.fade-scale { opacity: 0; transform: scale(0.92); transition: opacity 0.6s ease, transform 0.6s ease; }
.fade.show, .fade-left.show, .fade-right.show, .fade-scale.show { opacity: 1; transform: none; }

/* stagger delays */
.stagger > *:nth-child(1) { transition-delay: 0s; }
.stagger > *:nth-child(2) { transition-delay: 0.08s; }
.stagger > *:nth-child(3) { transition-delay: 0.16s; }
.stagger > *:nth-child(4) { transition-delay: 0.24s; }
.stagger > *:nth-child(5) { transition-delay: 0.32s; }
.stagger > *:nth-child(6) { transition-delay: 0.4s; }

/* hero entrance */
@keyframes heroIn { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: none; } }
.hero-text { animation: heroIn 0.7s ease both; }
.hero-photo { animation: heroIn 0.7s ease 0.15s both; }
.hero-stats { animation: heroIn 0.5s ease 0.35s both; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
    .nav-links {
        position: fixed; top: 0; right: -100%; width: 260px; height: 100vh;
        background: var(--bg-card); flex-direction: column; padding: 80px 24px 24px;
        border-left: 1px solid var(--border); transition: 0.3s; z-index: 1000;
    }
    .nav-links.open { right: 0; }
    .nav-toggle { display: flex; }

    .hero-inner { flex-direction: column-reverse; text-align: center; gap: 32px; }
    .hero-photo { width: 220px; height: 220px; border-radius: 16px; }
    .hero-desc { margin: 0 auto 32px; }
    .hero-btns { justify-content: center; }
    .hero-stats { width: 100%; }
    .stat-item { flex: 1; padding: 16px 12px; }
    .hero-tagline { margin: 0 auto 20px; }
    .hero-accent { margin: 0 auto 16px; }
    .hero-decor { display: none; }

    .about-top { grid-template-columns: 1fr; gap: 32px; }
    .about-img { max-width: 260px; margin: 0 auto; }
    .about-cards { grid-template-columns: 1fr 1fr; }

    .contact-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }

    .section { padding: 70px 0; }

    .lb-prev { left: 8px; }
    .lb-next { right: 8px; }

    .pd-title { font-size: 1.6rem; }
    .pd-gallery { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
    .hero-photo { width: 180px; height: 180px; }
    .hero-name { font-size: 2rem; }
    .stat-item { padding: 14px 8px; }
    .stat-num { font-size: 1.3rem; }
    .biz-grid, .skills-grid, .projects-grid { grid-template-columns: 1fr; }
    .about-cards { grid-template-columns: 1fr; }
    .btn { padding: 10px 20px; font-size: 0.85rem; }
    .pd-title { font-size: 1.4rem; }
}
    </style>
</head>
<body>

<nav class="nav">
    <div class="container">
        <a href="#home" class="nav-logo" id="nav-logo"></a>
        <ul class="nav-links" id="nav-links"></ul>
        <div class="nav-right">
            <div class="lang-switch" id="lang-switch">
                <button class="lang-btn active" data-lang="id" title="Indonesia"><svg viewBox="0 0 3 2" width="24" height="16"><rect width="3" height="1" fill="#CE1126"/><rect y="1" width="3" height="1" fill="#fff"/></svg></button>
                <button class="lang-btn" data-lang="en" title="English"><svg viewBox="0 0 60 30" width="24" height="16"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="2"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/></svg></button>
            </div>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</nav>

<section class="hero section" id="home"><div class="container" id="hero-c"></div></section>
<section class="section" id="about"><div class="container" id="about-c"></div></section>
<section class="section" id="business"><div class="container" id="business-c"></div></section>
<section class="section" id="skill"><div class="container" id="skill-c"></div></section>
<section class="section" id="project"><div class="container" id="project-c"></div></section>
<section class="section" id="contact"><div class="container" id="contact-c"></div></section>
<footer class="footer"><div class="container" id="footer-c"></div></footer>

<div class="lightbox" id="lightbox">
    <div class="lb-wrap">
        <button class="lb-close" id="lb-close"><i class="fa-solid fa-xmark"></i></button>
        <button class="lb-nav lb-prev" id="lb-prev"><i class="fa-solid fa-chevron-left"></i></button>
        <img class="lb-img" id="lb-img" src="" alt="">
        <button class="lb-nav lb-next" id="lb-next"><i class="fa-solid fa-chevron-right"></i></button>
        <div class="lb-counter" id="lb-counter"></div>
    </div>
</div>

<div class="project-detail" id="project-detail">
    <div class="pd-header">
        <div class="container">
            <button class="pd-back" onclick="closePD()"><i class="fa-solid fa-arrow-left"></i> <span id="pd-back-text">Kembali</span></button>
        </div>
    </div>
    <div class="pd-content">
        <div class="container pd-body"></div>
    </div>
</div>

<script src="data.js"></script>
<script>
/* ── Helpers ── */
function esc(s){ const d=document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
function safeURL(u){ if(!u)return '#'; const t=u.trim(); return /^(https?:|mailto:|tel:|#)/.test(t)?encodeURI(t):'#'; }
function safeImg(p){ if(!p)return ''; const t=p.trim(); return /^images\/[\w\-. ]+\.(jpg|jpeg|png|gif|webp|svg|avif)$/i.test(t)?t:''; }

/* ── Language ── */
let lang='id';
const UI={
    id:{heroPrefix:'Saya',contactBtn:'Hubungi Saya',projectBtn:'Lihat Project',
        aboutLabel:'Tentang Saya',aboutTitle:'About Me',bizLabel:'Usaha Saya',bizTitle:'Business',
        bizVisit:'Kunjungi',skillLabel:'Keahlian',skillTitle:'Skills',
        skillSub:'Teknologi dan tools yang saya gunakan.',
        projLabel:'Portfolio',projTitle:'Projects',
        projSub:'Beberapa project terbaik yang pernah saya kerjakan.',
        contactLabel:'Kontak',contactTitle:'Get in Touch',locLabel:'Lokasi',
        fName:'Nama',fEmail:'Email',fSubject:'Subject',fMsg:'Pesan',
        phName:'Nama lengkap',phEmail:'email@example.com',phSubj:'Perihal',
        phMsg:'Tulis pesan...',fSend:'Kirim'},
    en:{heroPrefix:"I'm",contactBtn:'Contact Me',projectBtn:'View Projects',
        aboutLabel:'About',aboutTitle:'About Me',bizLabel:'My Business',bizTitle:'Business',
        bizVisit:'Visit',skillLabel:'Skills',skillTitle:'Skills',
        skillSub:'Technologies and tools I use daily.',
        projLabel:'Portfolio',projTitle:'Projects',
        projSub:'Some of the best projects I have worked on.',
        contactLabel:'Contact',contactTitle:'Get in Touch',locLabel:'Location',
        fName:'Name',fEmail:'Email',fSubject:'Subject',fMsg:'Message',
        phName:'Full name',phEmail:'email@example.com',phSubj:'Subject',
        phMsg:'Write your message...',fSend:'Send'}
};
function t(k){return UI[lang][k]||UI.id[k]||k;}
function switchLang(l){
    lang=l; localStorage.setItem('lang',l);
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
    document.documentElement.lang=l; render(); requestAnimationFrame(initFade);
}

/* ── Render ── */
function render(){
    // Nav
    document.getElementById('nav-logo').textContent = DATA.logo;
    document.getElementById('nav-links').innerHTML = DATA.navLinks.map(l =>
        `<li><a href="${esc(l.href)}">${esc(l.label)}</a></li>`
    ).join('');

    // Hero
    const hp = safeImg(DATA.heroPhoto);
    const avatar = hp ? `<img src="${esc(hp)}" alt="${esc(DATA.name)}">` : `<i class="fa-solid fa-user"></i>`;
    const stats = (lang==='en'&&DATA.en?.stats)||DATA.stats;
    document.getElementById('hero-c').innerHTML = `
        <div class="hero-decor hero-decor-1"></div>
        <div class="hero-decor hero-decor-2"></div>
        <div class="hero-decor hero-decor-3"></div>
        <div class="hero-inner">
            <div class="hero-text">
                <div class="hero-accent"></div>
                <p class="hero-greeting">${lang==='en'?'Hello, I\'m':'Halo, perkenalkan'}</p>
                <h1 class="hero-name"><span>${esc(DATA.name)}</span></h1>
                <p class="hero-tagline">${esc((lang==='en'&&DATA.en?.tagline)||DATA.tagline)}</p>
                <div class="hero-status"><span class="hero-status-dot"></span> ${lang==='en'?'Available for hire':'Tersedia untuk project'}</div>
                <p class="hero-desc">${esc((lang==='en'&&DATA.en?.heroDescription)||DATA.heroDescription)}</p>
                <div class="hero-btns">
                    <a href="#contact" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> ${t('contactBtn')}</a>
                    <a href="#project" class="btn btn-ghost"><i class="fa-solid fa-eye"></i> ${t('projectBtn')}</a>
                </div>
                <div class="hero-stats">
                    ${stats.map(s=>`<div class="stat-item"><div class="stat-num">${esc(s.number)}</div><div class="stat-label">${esc(s.label)}</div></div>`).join('')}
                </div>
            </div>
            <div class="hero-photo">${avatar}</div>
        </div>`;

    // About
    const ap = safeImg(DATA.about.photo);
    const aboutImg = ap ? `<img src="${esc(ap)}" alt="${esc(DATA.name)}">` : `<i class="fa-solid fa-image"></i>`;
    const aboutParas = (lang==='en'&&DATA.en?.aboutParagraphs)||DATA.about.paragraphs;
    const aboutInfo = (lang==='en'&&DATA.en?.aboutInfo)||DATA.about.info;
    const aboutIcons = ['fa-solid fa-user','fa-solid fa-location-dot','fa-solid fa-envelope','fa-solid fa-briefcase'];
    document.getElementById('about-c').innerHTML = `
        <div class="section-label fade">${t('aboutLabel')}</div>
        <h2 class="section-title fade">${t('aboutTitle')}</h2>
        <div class="section-sub"></div>
        <div class="about-layout">
            <div class="about-top">
                <div class="about-img fade-left">${aboutImg}</div>
                <div class="about-text fade-right">
                    ${aboutParas.map(p=>`<p>${esc(p)}</p>`).join('')}
                </div>
            </div>
            <div class="about-cards stagger">
                ${aboutInfo.map((i,idx)=>`<div class="about-card fade">
                    <div class="ac-icon"><i class="${aboutIcons[idx]||'fa-solid fa-circle-info'}"></i></div>
                    <div class="ac-label">${esc(i.label)}</div>
                    <div class="ac-value">${esc(i.value)}</div>
                </div>`).join('')}
            </div>
        </div>`;

    // Business
    const bizSub = (lang==='en'&&DATA.en?.businessSubtitle)||DATA.businessSubtitle||'';
    document.getElementById('business-c').innerHTML = `
        <div class="section-label fade">${t('bizLabel')}</div>
        <h2 class="section-title fade">${t('bizTitle')}</h2>
        <p class="section-sub fade">${esc(bizSub)}</p>
        <div class="biz-grid stagger">
            ${DATA.businesses.map(b=>{
                const logo = safeImg(b.logo);
                const logoHTML = logo ? `<img src="${esc(logo)}" alt="${esc(b.title)}">` : `<i class="${esc(b.icon||'fa-solid fa-store')}"></i>`;
                const ig = b.instagram ? safeURL(b.instagram) : '#';
                return `<div class="biz-card fade">
                    <div class="biz-header">
                        <div class="biz-logo">${logoHTML}</div>
                        <div>
                            <div class="biz-name">${esc(b.title)}</div>
                            ${b.igHandle?`<div class="biz-handle">${esc(b.igHandle)}</div>`:''}
                        </div>
                    </div>
                    <div class="biz-body">
                        <p class="biz-desc">${esc(b.description)}</p>
                        ${b.features&&b.features.length?`<ul class="biz-features">${b.features.map(f=>`<li>${esc(f)}</li>`).join('')}</ul>`:''}
                        <div class="biz-bottom">
                            ${b.price?`<div class="biz-price">${esc(b.price)}</div>`:''}
                            ${b.instagram?`<a href="${ig}" target="_blank" rel="noopener noreferrer" class="biz-link"><i class="fa-brands fa-instagram"></i> ${t('bizVisit')}</a>`:''}
                        </div>
                    </div>
                </div>`;
            }).join('')}
        </div>`;

    // Skills
    document.getElementById('skill-c').innerHTML = `
        <div class="section-label fade">${t('skillLabel')}</div>
        <h2 class="section-title fade">${t('skillTitle')}</h2>
        <p class="section-sub fade">${t('skillSub')}</p>
        <div class="skills-grid stagger">
            ${DATA.skillCategories.map(c=>`
                <div class="skill-card fade">
                    <h3><i class="${esc(c.icon)}"></i> ${esc(c.title)}</h3>
                    <div class="skill-tags">
                        ${c.skills.map(s=>`<span class="skill-tag"><i class="${esc(s.icon)}"></i> ${esc(s.name)}</span>`).join('')}
                    </div>
                </div>
            `).join('')}
        </div>`;

    // Projects
    document.getElementById('project-c').innerHTML = `
        <div class="section-label fade">${t('projLabel')}</div>
        <h2 class="section-title fade">${t('projTitle')}</h2>
        <p class="section-sub fade">${t('projSub')}</p>
        <div class="projects-grid stagger">
            ${DATA.projects.map((p,i)=>{
                const imgs=(p.images||(p.image?[p.image]:[])).map(safeImg).filter(Boolean);
                const first=imgs.length?imgs[0]:'';
                const thumb=first?`<img src="${esc(first)}" alt="${esc(p.title)}" loading="lazy">`:`<i class="fa-solid fa-folder-open"></i>`;
                return `<div class="project-card fade">
                    <div class="project-thumb">
                        ${thumb}
                        ${imgs.length>1?`<div class="project-count"><i class="fa-solid fa-images"></i> ${imgs.length}</div>`:''}
                        <div class="project-overlay">
                            ${imgs.length?`<button class="prim" onclick="openLB(${i},0)"><i class="fa-solid fa-expand"></i> View</button>`:''}
                            ${p.liveUrl&&p.liveUrl!=='#'?`<a href="${safeURL(p.liveUrl)}" target="_blank" rel="noopener noreferrer" class="prim"><i class="fa-solid fa-arrow-up-right-from-square"></i> Live</a>`:''}
                        </div>
                    </div>
                    <div class="project-body">
                        <div class="project-tags">${p.tags.map(tg=>`<span class="project-tag">${esc(tg)}</span>`).join('')}</div>
                        <h3>${esc(p.title)}</h3>
                        <p>${esc(p.description)}</p>
                        <button class="project-live" onclick="openPD(${i})"><i class="fa-solid fa-folder-open"></i> ${lang==='en'?'View Project':'Lihat Project'}</button>
                    </div>
                </div>`;
            }).join('')}
        </div>`;

    // Contact
    const fa = safeURL(DATA.contact.formAction);
    const contactDesc = (lang==='en'&&DATA.en?.contactDescription)||DATA.contact.description;
    document.getElementById('contact-c').innerHTML = `
        <div class="section-label fade">${t('contactLabel')}</div>
        <h2 class="section-title fade">${t('contactTitle')}</h2>
        <p class="section-sub fade">${esc(contactDesc)}</p>
        <div class="contact-grid">
            <div class="fade-left">
                <div class="contact-items">
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fa-solid fa-envelope"></i></div>
                        <div><h4>Email</h4><a href="mailto:${esc(DATA.contact.email)}">${esc(DATA.contact.email)}</a></div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fa-solid fa-phone"></i></div>
                        <div><h4>Phone</h4><a href="tel:${esc(DATA.contact.phone)}">${esc(DATA.contact.phone)}</a></div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fa-solid fa-location-dot"></i></div>
                        <div><h4>${t('locLabel')}</h4><p>${esc(DATA.contact.location)}</p></div>
                    </div>
                </div>
                <div class="socials">
                    ${DATA.socials.map(s=>`<a href="${safeURL(s.url)}" target="_blank" rel="noopener noreferrer" class="social-btn" title="${esc(s.label)}"><i class="${esc(s.icon)}"></i></a>`).join('')}
                </div>
            </div>
            <form class="form fade-right" action="${esc(fa)}" method="POST">
                <div class="form-row">
                    <div><label>${t('fName')}</label><input type="text" name="name" placeholder="${t('phName')}" required></div>
                    <div><label>${t('fEmail')}</label><input type="email" name="email" placeholder="${t('phEmail')}" required></div>
                </div>
                <div><label>${t('fSubject')}</label><input type="text" name="subject" placeholder="${t('phSubj')}" required></div>
                <div><label>${t('fMsg')}</label><textarea name="message" placeholder="${t('phMsg')}" required></textarea></div>
                <button type="submit" class="btn btn-primary" style="align-self:flex-start"><i class="fa-solid fa-paper-plane"></i> ${t('fSend')}</button>
            </form>
        </div>`;

    // Footer
    const ft = (lang==='en'&&DATA.en?.footerText)||DATA.footerText;
    document.getElementById('footer-c').innerHTML = `<p>&copy; ${new Date().getFullYear()} <span>${esc(ft)}</span></p>`;
}

/* ── Lightbox ── */
let lbImgs=[], lbIdx=0;
function openLB(pi,ii){
    const p=DATA.projects[pi];
    const imgs=(p.images||(p.image?[p.image]:[])).map(safeImg).filter(Boolean);
    if(!imgs.length)return;
    lbImgs=imgs; lbIdx=ii||0; showLB();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow='hidden';
}
function closeLB(){
    document.getElementById('lightbox').classList.remove('active');
    if(!document.getElementById('project-detail').classList.contains('active'))
        document.body.style.overflow='';
}
function showLB(){
    document.getElementById('lb-img').src=lbImgs[lbIdx];
    document.getElementById('lb-counter').textContent=lbImgs.length>1?`${lbIdx+1} / ${lbImgs.length}`:'';
    document.getElementById('lb-prev').style.display=lbImgs.length>1?'':'none';
    document.getElementById('lb-next').style.display=lbImgs.length>1?'':'none';
}
function lbP(){ lbIdx=(lbIdx-1+lbImgs.length)%lbImgs.length; showLB(); }
function lbN(){ lbIdx=(lbIdx+1)%lbImgs.length; showLB(); }

/* ── Project Detail ── */
function openPD(idx){
    const p=DATA.projects[idx]; if(!p)return;
    const imgs=(p.images||(p.image?[p.image]:[])).map(safeImg).filter(Boolean);
    const desc=p.longDescription||p.description;
    const pd=document.getElementById('project-detail');
    document.getElementById('pd-back-text').textContent=lang==='en'?'Back':'Kembali';
    pd.querySelector('.pd-body').innerHTML=`
        <h1 class="pd-title">${esc(p.title)}</h1>
        <div class="pd-tags">${p.tags.map(tg=>`<span class="pd-tag">${esc(tg)}</span>`).join('')}</div>
        <div class="pd-desc">${esc(desc)}</div>
        ${imgs.length?`<div class="pd-gallery">${imgs.map((im,ii)=>`<div class="pd-gallery-img" onclick="openLB(${idx},${ii})"><img src="${esc(im)}" alt="${esc(p.title)}" loading="lazy"></div>`).join('')}</div>`:''}
        <div class="pd-actions">
            ${p.liveUrl&&p.liveUrl!=='#'?`<a href="${safeURL(p.liveUrl)}" target="_blank" rel="noopener noreferrer" class="btn btn-primary"><i class="fa-solid fa-arrow-up-right-from-square"></i> Live Demo</a>`:''}
            <button onclick="closePD()" class="btn btn-ghost"><i class="fa-solid fa-arrow-left"></i> ${lang==='en'?'Back to Projects':'Kembali ke Project'}</button>
        </div>`;
    pd.classList.add('active');
    document.body.style.overflow='hidden';
    pd.scrollTop=0;
}
function closePD(){
    document.getElementById('project-detail').classList.remove('active');
    document.body.style.overflow='';
}

/* ── Scroll Fade ── */
function initFade(){
    const obs=new IntersectionObserver(entries=>{
        entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('show'); });
    },{threshold:0.08, rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.fade,.fade-left,.fade-right,.fade-scale').forEach(el=>obs.observe(el));
}

/* ── Nav ── */
function initNav(){
    const secs=document.querySelectorAll('section[id]');
    window.addEventListener('scroll',()=>{
        const y=window.scrollY+100;
        secs.forEach(s=>{
            const a=document.querySelector(`.nav-links a[href="#${s.id}"]`);
            if(a) a.classList.toggle('active', y>=s.offsetTop && y<s.offsetTop+s.offsetHeight);
        });
    },{passive:true});
}

/* ── Mobile Menu ── */
function initMenu(){
    const t=document.getElementById('nav-toggle'), l=document.getElementById('nav-links');
    t.addEventListener('click',()=>{ l.classList.toggle('open'); t.classList.toggle('active'); });
    l.addEventListener('click',e=>{ if(e.target.tagName==='A'){ l.classList.remove('open'); t.classList.remove('active'); }});
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded',()=>{
    const savedLang=localStorage.getItem('lang');
    if(savedLang){lang=savedLang;document.documentElement.lang=savedLang;}
    document.querySelectorAll('.lang-btn').forEach(b=>{
        b.classList.toggle('active',b.dataset.lang===lang);
        b.addEventListener('click',()=>switchLang(b.dataset.lang));
    });
    render();
    initNav();
    initMenu();
    document.getElementById('lb-close').addEventListener('click',closeLB);
    document.getElementById('lb-prev').addEventListener('click',lbP);
    document.getElementById('lb-next').addEventListener('click',lbN);
    document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeLB(); });
    document.addEventListener('keydown',e=>{
        if(document.getElementById('lightbox').classList.contains('active')){
            if(e.key==='Escape')closeLB(); if(e.key==='ArrowLeft')lbP(); if(e.key==='ArrowRight')lbN();
            return;
        }
        if(e.key==='Escape'&&document.getElementById('project-detail').classList.contains('active'))closePD();
    });
    document.addEventListener('click',e=>{
        const a=e.target.closest('a[href^="#"]'); if(!a)return;
        e.preventDefault(); const t=document.querySelector(a.getAttribute('href'));
        if(t) t.scrollIntoView({behavior:'smooth'});
    });
    requestAnimationFrame(initFade);
});
</script>
</body>
</html>
